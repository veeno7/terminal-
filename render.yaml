# ============================================================
# CortexForge — Render Blueprint Deployment Config
# Defines all services for Render cloud deployment
# ============================================================

services:
  # ─── Core Engine + API Web Service ─────────────────────────
  - type: web
    name: cortexforge-core
    env: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/agent/state
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/db
      - key: LOG_LEVEL
        value: info
    disk:
      name: cortexforge-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # ─── Frontend Static Site ──────────────────────────────────
  - type: static_site
    name: cortexforge-frontend
    buildCommand: cd src/web && npm ci && npm run build
    publishPath: src/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://cortexforge-core.onrender.com/api
      - key: VITE_WS_URL
        value: wss://cortexforge-core.onrender.com/ws

  # ─── Background Worker (for long-running tasks) ────────────
  - type: worker
    name: cortexforge-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/db
      - key: LOG_LEVEL
        value: info
    disk:
      name: cortexforge-worker-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1